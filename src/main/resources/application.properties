# =====================================================================================
# summary-service — application.properties
#
# HOUSE RULE (routesphere-like): this file ONLY enables/disables a tenant instance and
# sets the ACTIVE PROFILE. All real configuration (datasource, kafka, which summary beans
# are active, batch sizes) lives in the per-tenant profile yml, loaded + flattened by
# TenantProfileConfigSource from:
#     config/tenants/<tenant>/<profile>/profile-<profile>.yml
# selected from config/tenants.yml (the active tenant + profile registry).
# =====================================================================================

quarkus.application.name=summary-service

# Worker auto-start. Default OFF so the app boots without a reachable Kafka/MySQL (build,
# dev, CI). The architect flips this on at cutover, or starts beans via the registry API.
summary.autostart=false

# --- DB credentials: INLINE in the active profile yml (no OpenBao), matching billing-core ---
# quarkus.datasource.username/password come from config/tenants/<tenant>/<profile>/profile-<profile>.yml.
# Fill the CCL creds there at cutover (see docs/decisions.md "Secrets").

# Datasource is created lazily; do not probe MySQL at startup (cutover is coordinated).
quarkus.datasource.health.enabled=false
quarkus.datasource.jdbc.acquisition-timeout=5
