# =====================================================================================
# Active tenant + profile registry (routesphere-like).
#
# TenantProfileConfigSource reads this file, picks the FIRST tenant with enabled=true,
# and loads config/tenants/<name>/<profile>/profile-<profile>.yml, flattening it into
# Quarkus config (quarkus.datasource.*, summary.beans.*, ...).
#
# Credentials are INLINE in each profile (no OpenBao), matching billing-core.
# =====================================================================================
tenants:
  - name: tcbl
    enabled: true
    profile: dev
  - name: tcbl
    enabled: false
    profile: prod
