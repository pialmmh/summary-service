# =====================================================================================
# tcbl / dev — summary-service profile (OUTBOX consumer)
#
# Flattened into Quarkus config by TenantProfileConfigSource. Endpoints MATCH billing-core (dotnet) CCL:
# DB 103.95.96.77:3306, Kafka 103.95.96.78:9092, config-manager 103.95.96.78:7072. Credentials are INLINE
# (no OpenBao), same approach as billing-core. The CCL DB/Kafka are NOT reachable without the CCL VPN —
# intentionally left that way (no local fallback); fill the creds + bring up connectivity to run.
# =====================================================================================

quarkus:
  datasource:
    db-kind: mysql
    # CCL DB — same as billing-core (dotnet): host 103.95.96.77, admin schema telcobright, reseller schemas
    # res_NNN resolved per tenant at runtime. Credentials INLINE (no OpenBao), same as billing-core.
    username: ""                                  # CCL DB user     — TODO: set (same value as billing-core)
    password: ""                                  # CCL DB password — TODO: set (same value as billing-core)
    jdbc:
      # allowMultiQueries=true — the engine runs ;-joined UPDATE/DELETE segments in one round trip.
      url: jdbc:mysql://103.95.96.77:3306/telcobright?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowMultiQueries=true
      min-size: 2
      max-size: 16

summary:
  # 1) CONTEXT beans — shared read-only, loaded ONCE from config-manager (same apis billing calls).
  #    config-manager is UNCHANGED; summary is just another client. Loaded lazily at bean activation.
  contexts:
    mediationContext:
      source: config-manager
      base-url: http://103.95.96.78:7072         # CCL config-manager — same as billing-core (dotnet)
      tenant: tcbl                               # NB: align with billing-core's ccl78 tenant chain at cutover

  # 2) Outbox consumer settings (input is the MySQL outbox; Kafka is only a ping).
  outbox:
    entity-type: cdr
    ping-topic: cdr_summary_ping                # PINNED (matches billing-core producer)
    ping-bootstrap-servers: 103.95.96.78:9092   # CCL Kafka — same as billing-core (dotnet)
    poll-interval-seconds: 5                     # fallback drain if no ping arrives
    max-rows-per-tx: 1                           # 1 outbox row = 1 packed billing batch (~1000 cdrs) per drain tx
    segment-size: 1000                           # rows per multi-row extended INSERT
    reaper-interval-seconds: 60                  # trims summary_affected past min(last_offset)
    quarantine-after: 8                          # consecutive decode/build failures on the SAME head row before
                                                 # it is copied to summary_deadletter and skipped (per bean)

  # 3) SUMMARY beans to activate — each name = a per-window bean CLASS under summarybeans/<category>/.
  #    The window is fixed by the class (DailySummary/HourlySummary); the table is DERIVED as
  #    sum_voice_<window>_<table-suffix> — the suffix picks one of the PRE-PROVISIONED sets (sum_voice_day_3 etc).
  #    service-group FILTERS records; table-suffix NAMES the table. Each runs as its OWN parallel worker.
  #    Legacy billing summarised SG10 AND SG11 — BOTH must stay covered or their records are silently skipped
  #    (the offset still advances and the reaper deletes the rows: unrecoverable). The Sg11 pair below has no
  #    catalog class; its `window:` key makes the bootstrap CONFIG-INSTANTIATE a call bean under that name.
  #    At cutover, point the suffixes at billing's REAL sets (SG10 -> "03", SG11 -> "02") if those are the names.
  enabledSummary:
    - dailyCallSummary                           # -> summarybeans/call/DailySummary.java  (sum_voice_day_3)
    - hourlyCallSummary                          # -> summarybeans/call/HourlySummary.java (sum_voice_hr_3)
    - dailyCallSummarySg11                       # config-instantiated (window key below)   (sum_voice_day_2)
    - hourlyCallSummarySg11                      # config-instantiated                      (sum_voice_hr_2)
  beans:
    dailyCallSummary:
      service-group: 10                          # keep SG10 records
      table-suffix: "3"                          # -> sum_voice_day_3 (pre-provisioned set)
      context: mediationContext
    hourlyCallSummary:
      service-group: 10
      table-suffix: "3"                          # -> sum_voice_hr_3
      context: mediationContext
    dailyCallSummarySg11:
      window: daily                              # no catalog class -> config-instantiated call bean
      service-group: 11
      table-suffix: "2"                          # -> sum_voice_day_2 (use "02" at cutover if legacy names apply)
      context: mediationContext
    hourlyCallSummarySg11:
      window: hourly
      service-group: 11
      table-suffix: "2"                          # -> sum_voice_hr_2
      context: mediationContext
