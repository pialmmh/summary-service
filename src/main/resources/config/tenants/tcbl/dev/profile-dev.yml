# =====================================================================================
# tcbl / dev — summary-service profile
#
# Flattened into Quarkus config by TenantProfileConfigSource. Self-contained (no profile
# inheritance). NO SECRETS here: quarkus.datasource.password is resolved from OpenBao at
# cutover (kv/summary-service/mysql). For local-only dev you may export
# QUARKUS_DATASOURCE_PASSWORD via your shell, but never commit it.
# =====================================================================================

quarkus:
  datasource:
    db-kind: mysql
    username: root
    # password: <resolved from OpenBao kv/summary-service/mysql, NOT set here>
    jdbc:
      # 127.0.0.1 (not localhost) — MySQL runs in an lxc container on this host.
      # allowMultiQueries=true — the engine runs ;-joined UPDATE/DELETE segments in one round trip
      url: jdbc:mysql://127.0.0.1:3306/tcbl_summary?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowMultiQueries=true
      min-size: 2
      max-size: 16

# --- summary-service runtime config (consumed by the registry + workers + beans) ---
summary:
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    consumer-group: summary-service-tcbl
  defaults:
    segment-size: 1000          # rows per multi-row extended INSERT (legacy SegmentSizeForDbWrite)

  # ONLY the beans listed here are configured + (when summary.autostart=true) hot-started.
  # Add a new line to spin up another summary (e.g. a 5-minute CDR roll-up) with no code change.
  enabledSummary:
    - dailyCdrSummary
    - hourlyCdrSummary
    # - fiveMinCdrSummary
    # - weeklyCdrSummary

  # One CdrSummary entity; daily vs hourly differ ONLY by window + table. window accepts:
  # 5min / Nmin (multiple of 5) / hourly / daily / weekly / monthly / yearly.
  beans:
    dailyCdrSummary:
      entity: cdr
      window: daily
      table: sum_voice_day_03
      topic: rated-cdr                 # PROVISIONAL — reconcile with billing-core (dotnet)
      correction-topic: rated-cdr-correction
      service-group: 10                # SG10 -> *_03 (SG11 -> *_02)
      batch-size: 1000
      zone: Asia/Dhaka
    hourlyCdrSummary:
      entity: cdr
      window: hourly
      table: sum_voice_hr_03
      topic: rated-cdr
      correction-topic: rated-cdr-correction
      service-group: 10
      batch-size: 1000
      zone: Asia/Dhaka

    # Example future roll-ups — same entity, just a different window + table:
    # fiveMinCdrSummary: { entity: cdr, window: 5min,   table: sum_voice_5min_03, topic: rated-cdr, service-group: 10 }
    # weeklyCdrSummary:  { entity: cdr, window: weekly, table: sum_voice_week_03, topic: rated-cdr, service-group: 10 }
