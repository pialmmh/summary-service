# =====================================================================================
# tcbl / dev — summary-service profile (OUTBOX consumer)
#
# Flattened into Quarkus config by TenantProfileConfigSource. NO SECRETS here:
# quarkus.datasource.password resolves from OpenBao at cutover (kv/summary-service/mysql).
# =====================================================================================

quarkus:
  datasource:
    db-kind: mysql
    username: root
    # password: <resolved from OpenBao kv/summary-service/mysql, NOT set here>
    jdbc:
      # 127.0.0.1 (not localhost) — MySQL runs in an lxc container on this host.
      # allowMultiQueries=true — the engine runs ;-joined UPDATE/DELETE segments in one round trip.
      url: jdbc:mysql://127.0.0.1:3306/tcbl_summary?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowMultiQueries=true
      min-size: 2
      max-size: 16

summary:
  # 1) CONTEXT beans — shared read-only, loaded ONCE from config-manager (same apis billing calls).
  #    config-manager is UNCHANGED; summary is just another client. Loaded lazily at bean activation.
  contexts:
    mediationContext:
      source: config-manager
      base-url: http://10.10.196.1:7071        # PROVISIONAL (same config-manager billing uses)
      tenant: tcbl

  # 2) Outbox consumer settings (input is the MySQL outbox; Kafka is only a ping).
  outbox:
    entity-type: cdr
    ping-topic: cdr_summary_ping               # PINNED
    ping-bootstrap-servers: 127.0.0.1:9092
    poll-interval-seconds: 5                    # fallback drain if no ping arrives
    max-rows-per-tx: 50                         # outbox rows merged per drain transaction
    segment-size: 1000                          # rows per multi-row extended INSERT
    reaper-interval-seconds: 60                 # trims summary_affected past min(last_offset)

  # 3) SUMMARY beans to activate — each runs as its OWN parallel worker (own offset, own tx).
  enabledSummary:
    - dailyCdrSummary
    - hourlyCdrSummary
  beans:
    dailyCdrSummary:
      entity: cdr
      window: daily
      table: sum_voice_day_03
      service-group: 10                         # SG10 -> *_03 (SG11 -> *_02)
      context: mediationContext
    hourlyCdrSummary:
      entity: cdr
      window: hourly
      table: sum_voice_hr_03
      service-group: 10
      context: mediationContext
